- title: "Sofia Apgar (General Biology)"
  id: "apgar"
  bio: "I am a fourth-year undergraduate student at the University of Maryland, College Park majoring in General Biology. As a peer research mentor in the FIRE CellEx program, I have spent the past two years studying ribosome biogenesis. At the Visual System Development Lab, I am exploring how visual behavior changes after defects in retinal development."
